<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>402 Payment Required</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,200;14..32,300;14..32,400;14..32,500;14..32,600&family=Fira+Code:wght@300..500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary-bg: #ffffff;
            --text-main: #111111;
            --text-muted: #8b8b8b;
            --accent-gray: #f9f9fb;
            --border-color: #efefef;
            --container-width: 2000px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--primary-bg);
            color: var(--text-main);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            font-weight: 300;
            line-height: 1.5;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .glass-nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.98);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            z-index: 100;
            padding: 1.5rem 0;
        }

        .container {
            max-width: var(--container-width);
            margin: 0 auto;
            padding: 0 4rem;
            width: 100%;
            position: relative;
        }

        .logo {
            letter-spacing: 0.3em;
            font-weight: 400;
            text-transform: uppercase;
            text-decoration: none;
            color: #1a1a1a;
            font-size: 0.9rem;
        }

        .logo img {
            height: 40px;
            width: auto;
            object-fit: contain;
            border-radius: 4px;
        }

        .error-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            position: relative;
            padding: 8rem 0;
        }

        .bg-text {
            position: absolute;
            font-size: clamp(15rem, 30vw, 26rem);
            font-weight: 800;
            color: #f6f6f7;
            z-index: -1;
            right: 5%;
            bottom: -440px;
            user-select: none;
            letter-spacing: -0.05em;
            pointer-events: none;
        }

        .content-box {
            width: 100%;
            animation: fadeIn 1s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-size: clamp(3rem, 6vw, 4.5rem);
            font-weight: 200;
            letter-spacing: -0.03em;
            margin-bottom: 1rem;
        }

        .description {
            font-size: 1.25rem;
            color: var(--text-muted);
            margin-bottom: 4rem;
            max-width: 600px;
        }

        .status-block {
            background: var(--accent-gray);
            padding: 1.5rem 1rem 1.5rem 1rem;
            border-left: 4px solid #000;
            display: inline-block;
            min-width: 450px;
            margin-bottom: 4rem;
        }

        .status-code {
            font-family: 'Fira Code', 'Courier New', monospace;
            font-size: 0.9rem;
            color: #444;
            letter-spacing: 0.05em;
        }

        .status-code span {
            color: #d63031;
            font-weight: 600;
            margin-left: 12px;
        }

        .back-home a {
            color: #000;
            text-decoration: none;
            font-size: 0.8rem;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            font-weight: 500;
            padding-bottom: 8px;
            border-bottom: 2px solid #000;
            transition: all 0.3s;
        }

        .back-home a:hover {
            opacity: 0.6;
            padding-left: 10px;
        }

        .footer {
            background: #fff;
            border-top: 1px solid var(--border-color);
            padding: 2.5rem 0 1.8rem;
        }

        .footer-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            margin-bottom: 2rem;
        }

        .footer-logo {
            font-size: 0.9rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            font-weight: 300;
            line-height: 1.8;
        }

        .footer-social {
            margin-top: 1.2rem;
            display: flex;
            gap: 20px;
        }

        .footer-social a {
            color: #555;
            font-size: 20px;
            transition: color 0.3s;
        }

        .footer-social a:hover {
            color: #000;
        }

        .footer-contact {
            text-align: right;
        }

        .footer-contact h4 {
            font-size: 11px;
            letter-spacing: 0.3em;
            color: #bbb;
            text-transform: uppercase;
            margin-bottom: 1rem;
        }

        .footer-contact a {
            display: block;
            font-size: 0.9rem;
            color: #333;
            text-decoration: none;
            margin-bottom: 0.5rem;
        }

        .footer-copyright {
            padding-top: 1.2rem;
            border-top: 1px solid #f0f0f0;
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: #aaa;
        }

        @media (max-width: 992px) {
            .container {
                padding: 0 2rem;
            }

            .status-block {
                min-width: 100%;
            }

            .footer-grid {
                grid-template-columns: 1fr;
                gap: 2rem;
            }

            .footer-contact {
                text-align: left;
            }

            .bg-text {
                right: -5%;
                opacity: 0.4;
                bottom: -10%;
            }
        }
    </style>
</head>

<body>
    <nav class="glass-nav">
        <div class="container">
            <a href="home.html" class="logo">
                <img src="../images/Dubhe Nexus Web.jpg" alt="Logo">
            </a>
        </div>
    </nav>

    <main class="error-wrapper">
        <div class="container">
            <div class="bg-text">402</div>

            <div class="content-box">
                <h1>请先付钱</h1>
                <p class="description">
                    您访问的页面不存在或已被移除<br>
                    请检查您输入的网址是否正确
                </p>

                <div class="status-block">
                    <div class="status-code">
                        STATUS_CODE: <span>HTTP 404 NOT FOUND</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-grid">
                <div>
                    <div class="footer-logo">
                        天枢互联创研工作室<br>
                        Dubhe Nexus Innovation and Research Studio
                    </div>
                    <div class="footer-social">
                        <a href="https://github.com/Dubhe-Nexus" target="_blank"><i class="fa-brands fa-github"></i></a>
                        <a href="https://qm.qq.com/q/w6MtG2lsIM" target="_blank"><i class="fa-brands fa-qq"></i></a>
                    </div>
                </div>
                <div class="footer-contact">
                    <h4>联系我们</h4>
                    <a href="mailto:support@dubhenexus.org">support@dubhenexus.org</a>
                </div>
            </div>

            <div class="footer-copyright">
                <div style="text-align: left;">
                    &copy; 2026 Dubhe Nexus Innovation and Research Studio
                    <div style="margin-top: 5px;">
                        Licensed under <a href="license.html" style="color: #444; font-weight: 500;">MIT</a>
                    </div>
                </div>
                <div style="text-align: right; text-transform: uppercase; letter-spacing: 0.1em;">
                    创新 · 构建 · 迭代 · 因势而变
                </div>
            </div>
        </div>
    </footer>

    <script>
        lucide.createIcons();
    </script>
</body>

</html>
